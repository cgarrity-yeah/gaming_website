<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="weather-styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🌦️ Weather Dashboard</h1>
            <p>Real-time weather information at your fingertips</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search for a city..."
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="locationBtn" class="location-btn" title="Use my location">📍</button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error Message -->
        <div id="error" class="error hidden"></div>

        <!-- Current Weather Section -->
        <section id="currentWeather" class="current-weather hidden">
            <div class="weather-card">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="coordinates"></p>
                </div>
                <div class="weather-main">
                    <div class="temperature-section">
                        <div id="temperature" class="temperature"></div>
                        <div id="condition" class="condition"></div>
                    </div>
                    <div id="weatherIcon" class="weather-icon"></div>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-label">Feels Like</span>
                        <span id="feelsLike" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind Speed</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Visibility</span>
                        <span id="visibility" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">UV Index</span>
                        <span id="uvIndex" class="detail-value"></span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 7-Day Forecast Section -->
        <section id="forecastSection" class="forecast-section hidden">
            <h3>7-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container">
                <!-- Forecast cards will be populated by JavaScript -->
            </div>
        </section>

        <!-- Hourly Forecast Section -->
        <section id="hourlySection" class="hourly-section hidden">
            <h3>24-Hour Forecast</h3>
            <div id="hourlyContainer" class="hourly-container">
                <!-- Hourly cards will be populated by JavaScript -->
            </div>
        </section>

        <!-- Recent Searches -->
        <section class="recent-searches">
            <h3>Recent Searches</h3>
            <div id="recentSearches" class="recent-searches-list">
                <p class="no-searches">No recent searches yet</p>
            </div>
        </section>
    </div>

    <script src="weather-script.js"></script>
</body>
</html>
